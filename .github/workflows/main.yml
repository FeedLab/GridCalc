name: Build and Deploy to MonsterASP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Build steps
      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --configuration Release --no-restore

      - name: Publish project
        run: dotnet publish -c Release -o ./publish

      # 🔎 Debug print environment variables
      - name: Debug environment variables
        run: |
          echo "FTP_SERVER: ${{ secrets.FTP_SERVER }}"
          echo "FTP_PORT: ${{ secrets.FTP_PORT }}"
          echo "FTP_USERNAME: ${{ secrets.FTP_USERNAME }}"
          if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
            echo "FTP_PASSWORD is NOT set!"
          else
            echo "FTP_PASSWORD is set (value hidden)"
          fi

      # 🔎 Test FTP connection before deploy
      - name: Test FTP connection
        run: |
          echo "open ${{ secrets.FTP_SERVER }} ${{ secrets.FTP_PORT }}" > ftp.txt
          echo "user ${{ secrets.FTP_USERNAME }} ${{ secrets.FTP_PASSWORD }}" >> ftp.txt
          echo "quit" >> ftp.txt
          ftp -n < ftp.txt

      # 🚀 Deploy only if build & test succeed
      - name: Deploy to MonsterASP via FTP
        if: success()
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          port: ${{ secrets.FTP_PORT }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/        # <-- add trailing slash
          server-dir: /wwwroot/        # <-- also good practice to end with /

